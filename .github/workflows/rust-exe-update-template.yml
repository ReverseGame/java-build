name: Rust CI

on:
  workflow_call:
    inputs:
      projectName:
        required: true
        type: string
      packageName:
        required: true
        type: string
      buildStage:
        required: true
        type: string
        default: ""
      awsRegion:
        required: true
        type: string
      bucket:
        required: true
        type: string
    secrets:
      webhookFeishu:
        required: true
      awsAccessKey:
        required: false
      awsSecretKey:
        required: false
      updateApi:
        required: true

jobs:
  build_rust:
    runs-on: rust-windows

    steps:
      - name: post messasge
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ${{ inputs.projectName }} 开始构建
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Checkout repository
        uses: actions/checkout@v4
#      - name: Update Rust (更新 Rust)
#        run: |
#          rustup update
      - name: get cargo version
        id: version
        run: |
          $version = Select-String -Path cli/Cargo.toml -Pattern '^version = "(.*)"$' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "::set-output name=version::$($version)"
          Write-Output "version=$($version)" >> $Env:GITHUB_OUTPUT
        shell: powershell

      - name: test output
        run: |
          Write-Host "version = " ${{ steps.version.outputs.version }}
        shell: powershell
      - name: Build Product Release
        if: inputs.buildStage == 'product'
        run: |
          $env:RUSTFLAGS='--cfg env="product"';cargo build --release --target-dir ../target/${{ inputs.buildStage }}
      - name: Build Beta Release
        if: inputs.buildStage == 'beta'
        run: |
          $env:RUSTFLAGS='--cfg env="beta"';cargo build --release --target-dir ../target/${{ inputs.buildStage }}
      - name: Build Release
        if: inputs.buildStage != 'beta' && inputs.buildStage != 'product'
        run: |
          cargo build --release --target-dir ../target/${{ inputs.buildStage }}
      - name: Get target parent path
        id: target_parent_path
        shell: powershell
        run: |
          $parentPath = Split-Path -Parent (Get-Location).Path
          echo "PARENT_PATH=$parentPath" >> $env:GITHUB_OUTPUT

      - name: 设置上传参数
        id: upload_params
        shell: powershell
        run: |
          if ('${{ inputs.buildStage }}' -eq 'product') {
            $name = '${{ inputs.packageName }}-${{ inputs.buildStage }}-${{ github.ref_name }}-${{ github.sha }}.exe'
          } else {
            $name = '${{ inputs.packageName }}-${{ inputs.buildStage }}-${{ github.sha }}.exe'
          }
          echo "artifact_name=$name" >> $env:GITHUB_OUTPUT

      - name: Upload artifact (尝试 1/3)
        id: upload_1
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        continue-on-error: true
        with:
          name: ${{ steps.upload_params.outputs.artifact_name }}
          path: ${{ steps.target_parent_path.outputs.PARENT_PATH }}/target/${{ inputs.buildStage }}/release/${{ inputs.packageName }}.exe
          overwrite: true

      - name: Upload artifact 第 1 次失败通知
        if: steps.upload_1.outcome == 'failure'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ⚠️ ${{ inputs.projectName }} Upload artifact 失败 (1/3)，自动重试中...
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload artifact (尝试 2/3)
        if: steps.upload_1.outcome == 'failure'
        id: upload_2
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        continue-on-error: true
        with:
          name: ${{ steps.upload_params.outputs.artifact_name }}
          path: ${{ steps.target_parent_path.outputs.PARENT_PATH }}/target/${{ inputs.buildStage }}/release/${{ inputs.packageName }}.exe
          overwrite: true

      - name: Upload artifact 第 2 次失败通知
        if: steps.upload_2.outcome == 'failure'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ⚠️ ${{ inputs.projectName }} Upload artifact 失败 (2/3)，自动重试中...
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload artifact (尝试 3/3)
        if: steps.upload_2.outcome == 'failure'
        id: upload_3
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        continue-on-error: true
        with:
          name: ${{ steps.upload_params.outputs.artifact_name }}
          path: ${{ steps.target_parent_path.outputs.PARENT_PATH }}/target/${{ inputs.buildStage }}/release/${{ inputs.packageName }}.exe
          overwrite: true

      - name: Upload artifact 最终检查
        if: steps.upload_1.outcome == 'failure' && steps.upload_2.outcome == 'failure' && steps.upload_3.outcome == 'failure'
        shell: powershell
        run: |
          Write-Host "Upload artifact 连续 3 次失败"
          exit 1

      - name: 构建成功通知
        if: success()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ${{ inputs.projectName }} 构建成功 ✅
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 构建失败通知
        if: failure()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: interactive
          content: |
            {
              "header": {
                "title": {"content": "❌ ${{ inputs.projectName }} 构建失败", "tag": "plain_text"},
                "template": "red"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "content": "**部署环境:** ${{ inputs.buildStage }}\n**触发分支:** ${{ github.ref_name }}\n**提交 SHA:** ${{ github.sha }}",
                    "tag": "lark_md"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {"content": "📋 查看详情", "tag": "plain_text"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "type": "default"
                    }
                  ]
                }
              ]
            }

      - id: output
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ runner.os }}
    outputs:
      os: ${{ steps.output.outputs.lowercase }}
      version: ${{ steps.version.outputs.version }}

  upload:
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    needs: build_rust

    steps:
      - name: post messasge
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ${{ inputs.projectName }} 开始上传
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Download artifact product
        if: inputs.buildStage == 'product'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.packageName }}-${{ inputs.buildStage }}-${{ github.ref_name }}-${{ github.sha }}.exe
          path: ./

      - name: Download artifact
        if: inputs.buildStage != 'product'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.packageName }}-${{ inputs.buildStage }}-${{ github.sha }}.exe
          path: ./

      - name: Display structure of downloaded files
        run: ls -R

      - name: Upload to S3
        if: inputs.buildStage == 'product'
        uses: keithweaver/aws-s3-github-action@v1.0.0
        with:
          command: cp
          source: ./${{ inputs.packageName }}.exe
          destination: s3://${{ inputs.bucket }}/windows/release/${{ inputs.packageName }}-${{  github.ref_name }}.exe
          aws_access_key_id: ${{ secrets.awsAccessKey }}
          aws_secret_access_key: ${{ secrets.awsSecretKey }}
          aws_region: ${{ inputs.awsRegion }}
          flags: --acl public-read

      - name: Upload to S3
        if: inputs.buildStage != 'product'
        uses: keithweaver/aws-s3-github-action@v1.0.0
        with:
          command: cp
          source: ./${{ inputs.packageName }}.exe
          destination: s3://${{ inputs.bucket }}/windows/${{ inputs.buildStage }}/${{ inputs.packageName }}-${{ github.ref_name }}-${{ github.sha }}.exe
          aws_access_key_id: ${{ secrets.awsAccessKey }}
          aws_secret_access_key: ${{ secrets.awsSecretKey }}
          aws_region: ${{ inputs.awsRegion }}
          flags: --acl public-read

      - name: update version
        if: inputs.buildStage != 'dev'
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.updateApi }}/version/update
          method: "POST"
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"platform": "windows", "env": "${{ inputs.buildStage }}", "version": "${{ needs.build_rust.outputs.version }}", "hash": "${{ github.sha }}"}'

      - name: update download
        if: inputs.buildStage == 'product'
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.updateApi }}/windows/update
          method: "POST"
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"link": "https://${{ inputs.bucket }}.s3.amazonaws.com/windows/release/${{ inputs.packageName }}-${{  github.ref_name }}.exe"}'

      - name: 发布成功通知
        if: success() && inputs.buildStage != 'product'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ${{ inputs.projectName }} 发布成功 ✅
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                - - tag: text
                    text: '下载链接: '
                  - tag: text
                    text: https://${{ inputs.bucket }}.s3.amazonaws.com/windows/${{ inputs.buildStage }}/${{ inputs.packageName }}-${{ github.ref_name }}-${{ github.sha }}.exe

      - name: 发布成功通知 (product)
        if: success() && inputs.buildStage == 'product'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: ${{ inputs.projectName }} 发布成功 ✅
                content:
                - - tag: text
                    un_escape: true
                    text: '部署环境: ${{ inputs.buildStage }}'
                - - tag: text
                    text: '部署链接: '
                  - tag: a
                    text: github action
                    href: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                - - tag: text
                    text: '下载链接: '
                  - tag: text
                    text: https://${{ inputs.bucket }}.s3.amazonaws.com/windows/release/${{ inputs.packageName }}-${{  github.ref_name }}.exe

      - name: 发布失败通知
        if: failure()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.webhookFeishu }}
          msg_type: interactive
          content: |
            {
              "header": {
                "title": {"content": "❌ ${{ inputs.projectName }} 发布失败", "tag": "plain_text"},
                "template": "red"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "content": "**部署环境:** ${{ inputs.buildStage }}\n**触发分支:** ${{ github.ref_name }}\n**提交 SHA:** ${{ github.sha }}",
                    "tag": "lark_md"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {"content": "📋 查看详情", "tag": "plain_text"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "type": "default"
                    }
                  ]
                }
              ]
            }
