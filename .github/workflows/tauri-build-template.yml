name: Tauri CI

on:
    workflow_call:
        inputs:
            buildStage:
                required: true
                type: string
                default: "product"
            nodeVersion:
                required: false
                type: string
                default: "lts/*"
            tauriVersion:
                required: false
                type: string
                default: "1"
            awsRegion:
                required: true
                type: string
            buildFeishuWebhook:
                required: false
                type: string
            releaseFeishuWebhook:
                required: false
                type: string
            bucket:
                required: true
                type: string
            platform:
                required: true
                type: string
            releaseType:
                required: true
                type: string
            awsPath:
                required: true
                type: string
        secrets:
            awsAccessKey:
                required: true
            awsSecretKey:
                required: true
            patToken:
                required: true

jobs:
    build-tauri:
        outputs:
            product-info: ${{ steps.product-info.outputs.result }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ${{ inputs.platform }}
                      os: "windows"
                      arch: "x86_64"
                      args: |
                        -f ${{ inputs.buildStage }}
                        --config ./src-tauri/tauri.conf.${{ inputs.releaseType }}.json

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout code (检出代码)
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.patToken }}
                  submodules: recursive
            #      - name: Update Rust (更新 Rust)
            #        run: |
            #          rustup update
            - name: Get Project Info
              id: product-info
              uses: actions/github-script@v7
              env:
                  TAURI_VERSION: ${{ inputs.tauriVersion }}
                  BUILD_STAGE: ${{ inputs.buildStage }}
                  RELEASE_TYPE: ${{ inputs.releaseType }}
              with:
                  result-encoding: json
                  script: |
                      const version = require('./package.json').version
                      const tauriVersion = process.env.TAURI_VERSION
                      const buildStage = process.env.BUILD_STAGE
                      const releaseType = process.env.RELEASE_TYPE

                      let configJsonPath = "./src-tauri/tauri.conf.json"

                      if (releaseType === "internal") {
                        configJsonPath = "./src-tauri/tauri.conf.internal.json"
                      }



                      let productName = ""
                      if (tauriVersion === "1") {
                        productName = require(configJsonPath).package.productName
                      } else {
                        productName = require(configJsonPath).productName
                      }

                      const linuxFileAppName  = productName
                        .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
                        .replace(/([A-Z])([A-Z])(?=[a-z])/g, '$1-$2')
                        .replace(/[ _.]/g, '-')
                        .replace(/[()[\]{}]/g, '')
                        .toLowerCase();

                      console.log(`version: ${version ? version : '未找到'}`)
                      console.log(`productName: ${productName ? productName : '未找到'}`)
                      console.log(`linuxFileAppName: ${linuxFileAppName ? linuxFileAppName : '未找到'}`)

                      return {
                        version,
                        productName,
                        linuxFileAppName
                      }

            - uses: actions/github-script@v7
              id: message-content
              env:
                  RUN_ID: ${{ github.run_id }}
                  SERVER_URL: ${{ github.server_url }}
                  REPOSITORY: ${{ github.repository }}
              with:
                  result-encoding: json
                  script: |
                      const gh = {
                        server_url: process.env.SERVER_URL,
                        repository: process.env.REPOSITORY,
                        run_id: process.env.RUN_ID
                      }
                      return `**构建链接**\n[点击查看 Actions](${gh.server_url}/${gh.repository}/actions/runs/${gh.run_id})`

            - name: Post Message (发送飞书 Webhook 消息)
              uses: Comori/feishu@v0.0.5
              if: success() && inputs.buildFeishuWebhook
              with:
                  webhook-url: ${{ inputs.buildFeishuWebhook }}
                  msg-type: cardkit
                  cardkit-id: AAq15syMYoq55
                  cardkit-version: 0.0.3
                  content: |
                      title=${{ fromJson(steps.product-info.outputs.result).productName }} ${{ fromJson(steps.product-info.outputs.result).version }} ${{ matrix.os }} 开始构建
                      sub_title=构建流程: ${{ inputs.buildStage }}
                      content=${{ steps.message-content.outputs.result }}

            # - name: Setup Rust (设置 Rust 版本)
            #   if: matrix.platform == 'macos'
            #   uses: dtolnay/rust-toolchain@stable
            #   with:
            #     targets: "aarch64-apple-darwin,x86_64-apple-darwin"

#            - name: Setup pnpm (安装 pnpm)
#              uses: pnpm/action-setup@v4
#              with:
#                  version: latest
#
#            - name: Setup node (设置 node 版本)
#              uses: actions/setup-node@v4
#              with:
#                  node-version: ${{ inputs.nodeVersion }}

            - name: 设置pnpm国内源
              run: pnpm config set registry https://registry.npmmirror.com

            - name: Install frontend dependencies (安装前端依赖)
              run: pnpm install

            - name: Get target cache dir (获取构建缓存目录)
              id: target-cache-dir
              uses: actions/github-script@v7
              with:
                  result-encoding: string
                  script: |
                      const path = require('path')
                      const parentDir = path.dirname(process.env.GITHUB_WORKSPACE)
                      console.log(`当前工作目录: ${process.env.GITHUB_WORKSPACE}`)
                      console.log(`上级目录: ${parentDir}`)
                      return parentDir

            - name: Resolve tauri config path
              id: tauri-config
              uses: actions/github-script@v7
              with:
                  result-encoding: string
                  script: |
                      const releaseType = '${{ inputs.releaseType }}'
                      if (releaseType === 'product') {
                        return './src-tauri/tauri.conf.json'
                      }
                      return './src-tauri/tauri.conf.internal.json'

            - name: Build tauri (构建 tauri)
              id: build
              uses: tauri-apps/tauri-action@v0
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_PRIVATE_KEY: ${{ vars.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_KEY_PASSWORD: ${{ vars.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ vars.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ vars.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  RUSTFLAGS: '--cfg env="${{ inputs.releaseType }}"'
                  CARGO_TARGET_DIR: "${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}"
              with:
                  args: |
                      -f ${{ inputs.buildStage }}
                      --config ${{ steps.tauri-config.outputs.result }}

            - name: Upload Artifact (上传构建产物)
              id: upload-1
              if: success() && matrix.os == 'windows'
              uses: actions/upload-artifact@v4
              continue-on-error: true
              with:
                  if-no-files-found: error
                  overwrite: true
                  name: windows-bundle-${{ fromJson(steps.product-info.outputs.result).version }}
                  path: |
                      ${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}/release/bundle/msi/${{ fromJson(steps.product-info.outputs.result).productName }}_${{ fromJson(steps.product-info.outputs.result).version }}_x64_en-US.msi.zip
                      ${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}/release/bundle/msi/${{ fromJson(steps.product-info.outputs.result).productName }}_${{ fromJson(steps.product-info.outputs.result).version }}_x64_en-US.msi.zip.sig

            - name: Upload Artifact (重试)
              id: upload-2
              if: steps.upload-1.outcome == 'failure'
              uses: actions/upload-artifact@v4
              continue-on-error: true
              with:
                  if-no-files-found: error
                  overwrite: true
                  name: windows-bundle-${{ fromJson(steps.product-info.outputs.result).version }}
                  path: |
                      ${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}/release/bundle/msi/${{ fromJson(steps.product-info.outputs.result).productName }}_${{ fromJson(steps.product-info.outputs.result).version }}_x64_en-US.msi.zip
                      ${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}/release/bundle/msi/${{ fromJson(steps.product-info.outputs.result).productName }}_${{ fromJson(steps.product-info.outputs.result).version }}_x64_en-US.msi.zip.sig

            - name: Upload Artifact (最终重试)
              if: steps.upload-2.outcome == 'failure'
              uses: actions/upload-artifact@v4
              with:
                  if-no-files-found: error
                  overwrite: true
                  name: windows-bundle-${{ fromJson(steps.product-info.outputs.result).version }}
                  path: |
                      ${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}/release/bundle/msi/${{ fromJson(steps.product-info.outputs.result).productName }}_${{ fromJson(steps.product-info.outputs.result).version }}_x64_en-US.msi.zip
                      ${{ steps.target-cache-dir.outputs.result }}/gui/${{ inputs.releaseType }}/release/bundle/msi/${{ fromJson(steps.product-info.outputs.result).productName }}_${{ fromJson(steps.product-info.outputs.result).version }}_x64_en-US.msi.zip.sig

            - name: Post Message (发送飞书 Webhook 消息)
              uses: Comori/feishu@v0.0.5
              if: always() && inputs.buildFeishuWebhook
              with:
                  webhook-url: ${{ inputs.buildFeishuWebhook }}
                  msg-type: cardkit
                  cardkit-id: AAq15syMYoq55
                  cardkit-version: 0.0.3
                  content: |
                      title=${{ fromJson(steps.product-info.outputs.result).productName }} ${{ fromJson(steps.product-info.outputs.result).version }} ${{ matrix.os }} ${{ job.status }}
                      sub_title=构建版本: ${{ inputs.releaseType }} - ${{ inputs.buildStage }}
                      content=${{ steps.message-content.outputs.result }}

    publish:
        permissions:
            contents: write
            pull-requests: read
        runs-on: ubuntu-latest
        needs: [build-tauri]
        steps:
            - name: Checkout code (检出代码)
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.patToken }}
                  submodules: recursive

            - name: Download Windows Artifact (下载构建产物)
              uses: actions/download-artifact@v4
              with:
                  merge-multiple: true
                  path: ./releases/${{ fromJson(needs.build-tauri.outputs.product-info).linuxFileAppName }}

            - name: 校验构建产物
              run: |
                RELEASE_DIR="./releases/${{ fromJson(needs.build-tauri.outputs.product-info).linuxFileAppName }}"
                if [ ! -d "$RELEASE_DIR" ]; then
                  echo "::error::构建产物目录不存在: $RELEASE_DIR"
                  echo "Artifact 可能上传失败，请检查 build-tauri job 的上传步骤"
                  exit 1
                fi
                FILE_COUNT=$(ls -1 "$RELEASE_DIR" | wc -l)
                if [ "$FILE_COUNT" -eq 0 ]; then
                  echo "::error::构建产物目录为空: $RELEASE_DIR"
                  exit 1
                fi
                echo "找到 $FILE_COUNT 个构建产物:"
                ls -la "$RELEASE_DIR"

            - name: Generate Path
              id: random-path
              uses: actions/github-script@v7
              with:
                  result-encoding: string
                  script: |
                      const buildStage = '${{ inputs.buildStage }}'
                      const releaseType = '${{ inputs.releaseType }}'
                      const productInfo = JSON.parse(${{ toJSON(needs.build-tauri.outputs.product-info) }})

                      if (buildStage === 'product' && releaseType === 'product') {
                        return productInfo.version
                      } else {
                        return '${{ github.sha }}'
                      }

            - name: build install.json
              uses: actions/github-script@v7
              id: install-info
              env:
                  VERSION: ${{ fromJson(needs.build-tauri.outputs.product-info).version }}
                  PRODUCT_NAME: ${{ fromJson(needs.build-tauri.outputs.product-info).linuxFileAppName }}
                  BUILD_STAGE: ${{ inputs.buildStage }}
                  RELEASE_TYPE: ${{ inputs.releaseType }}
                  BUCKET: ${{ inputs.bucket }}
                  AWS_PATH: ${{ inputs.awsPath }}
                  RANDOM_PATH: ${{ steps.random-path.outputs.result }}
              with:
                  result-encoding: json
                  script: |
                      const fs = require('fs')
                      const crypto = require('crypto')

                      const version = process.env.VERSION
                      const productName = process.env.PRODUCT_NAME
                      const buildStage = process.env.BUILD_STAGE
                      const releaseType = process.env.RELEASE_TYPE
                      const bucket = process.env.BUCKET
                      const randomPath = process.env.RANDOM_PATH
                      const awsPath = process.env.AWS_PATH

                      console.log(fs.readdirSync(`./releases`))
                      const releases = fs.readdirSync(`./releases/${productName}`)
                      console.log(releases)


                      // windows
                      const windowsApp = releases.find(release => release.endsWith('.msi.zip'))
                      const windowsSig = releases.find(release => release.endsWith('.msi.zip.sig'))
                      const windowsSigContent = fs.readFileSync(`./releases/${productName}/${windowsSig}`, 'utf-8')

                      const fetchPrBody = async (number) => {
                        try {
                          const { data: pr } = await github.rest.pulls.get({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            pull_number: number
                          })
                          return pr.body?.trim()
                        } catch (error) {
                          core.warning(`Failed to fetch PR #${number} notes: ${error.message}`)
                          return undefined
                        }
                      }

                      let notes = context.payload?.pull_request?.body?.trim()

                      if (!notes) {
                        try {
                          const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            commit_sha: context.sha
                          })

                          const noteSource = prs.find(pr => pr.body && pr.body.trim().length > 0)
                          notes = noteSource?.body?.trim()
                        } catch (error) {
                          core.warning(`Failed to resolve PR notes: ${error.message}`)
                        }
                      }

                      if (!notes) {
                        const message = context.payload?.head_commit?.message || ''
                        const match = message.match(/#(\d+)/)
                        if (match) {
                          const prBody = await fetchPrBody(Number(match[1]))
                          if (prBody) {
                            notes = prBody
                          }
                        }
                      }

                      if (!notes && Array.isArray(context.payload?.commits)) {
                        for (const commit of context.payload.commits.reverse()) {
                          const commitMatch = commit.message?.match(/#(\d+)/)
                          if (commitMatch) {
                            const prBody = await fetchPrBody(Number(commitMatch[1]))
                            if (prBody) {
                              notes = prBody
                              break
                            }
                          }
                        }
                      }

                      if (!notes || notes.length === 0) {
                        notes = '优化已知问题'
                      }

                      const updateData = {
                        version: `v${version}`,
                        notes,
                        pub_date: new Date().toISOString(),
                        platforms: {
                          "windows-x86_64": {
                            url: `https://${bucket}.s3.amazonaws.com/${awsPath}/${randomPath}/${windowsApp}`,
                            signature: windowsSigContent
                          }
                        }
                      }

                      fs.writeFileSync(`./releases/install.json`, JSON.stringify(updateData, null, 2))

                      return updateData

            - name: Upload Release to S3
              if: success()
              uses: keithweaver/aws-s3-github-action@v1.0.0
              with:
                  source: ./releases/${{ fromJson(needs.build-tauri.outputs.product-info).linuxFileAppName }}/
                  destination: s3://${{ inputs.bucket }}/${{ inputs.awsPath }}/${{ steps.random-path.outputs.result }}/
                  aws_access_key_id: ${{ secrets.awsAccessKey }}
                  aws_secret_access_key: ${{ secrets.awsSecretKey }}
                  aws_region: ${{ inputs.awsRegion }}
                  flags: --acl public-read --recursive

            - name: Upload install.json to S3
              if: success()
              uses: keithweaver/aws-s3-github-action@v1.0.0
              with:
                  source: ./releases/install.json
                  destination: s3://${{ inputs.bucket }}/${{ inputs.awsPath }}/install.json
                  aws_access_key_id: ${{ secrets.awsAccessKey }}
                  aws_secret_access_key: ${{ secrets.awsSecretKey }}
                  aws_region: ${{ inputs.awsRegion }}
                  flags: --acl public-read

            - name: Get Update Log
              id: update-log
              uses: actions/github-script@v7
              env:
                  VERSION: ${{ fromJson(needs.build-tauri.outputs.product-info).version }}
              with:
                  result-encoding: string
                  script: |
                      const path = require('path')
                      const fs = require('fs')
                      const regTag = /## v[\d.]+/
                      const currentVersion = process.env.VERSION

                      const file = path.join(process.cwd(), 'UPDATE_LOG.md')

                      if (!fs.existsSync(file)) {
                        return "未找到更新日志文件"
                      }

                      let _tag
                      const tagMap = {}
                      const content = fs.readFileSync(file, { encoding: 'utf-8' }).split('\n')

                      content.forEach((line, index) => {
                        if (regTag.test(line)) {
                          _tag = line.replace('## ', '').trim()
                          if (!tagMap[_tag]) {
                            tagMap[_tag] = []
                          }
                        } else if (_tag) {
                          tagMap[_tag].push(line)
                        } else if (regTag.test(content[index + 1])) {
                          _tag = null
                        }
                      })

                      if (tagMap['v' + currentVersion]) {
                        return tagMap['v' + currentVersion].join('\n').trim()
                      } else {
                        return "无"
                      }

            - uses: actions/github-script@v7
              id: message-content
              env:
                  PRODUCT_NAME: ${{ fromJson(needs.build-tauri.outputs.product-info).productName }}
                  VERSION: ${{ fromJson(needs.build-tauri.outputs.product-info).version }}
                  INSTALL_INFO: ${{ steps.install-info.outputs.result }}
              with:
                  result-encoding: json
                  script: |
                      const productName = process.env.PRODUCT_NAME
                      const version = process.env.VERSION

                      const installInfo = JSON.parse(process.env.INSTALL_INFO)
                      const updateNotes = installInfo.notes || '优化已知问题'

                      const windowsUrl = `[Windows下载](${installInfo.platforms['windows-x86_64'].url})`
                      return `**🌟 更新内容**\n${updateNotes}\n\n**🔗 下载链接**\n${windowsUrl}`

            - name: Post Message (发送飞书 Webhook 消息)
              uses: Comori/feishu@v0.0.5
              if: success() && inputs.releaseFeishuWebhook
              with:
                  webhook-url: ${{ inputs.releaseFeishuWebhook }}
                  msg-type: cardkit
                  cardkit-id: AAq15syMYoq55
                  cardkit-version: 0.0.3
                  content: |
                      title=${{ fromJson(needs.build-tauri.outputs.product-info).productName }} ${{ fromJson(needs.build-tauri.outputs.product-info).version }} 发布成功
                      content=${{ steps.message-content.outputs.result }}

            - name: Create GitHub Tag (创建 GitHub Tag)
              if: success()
              uses: actions/github-script@v7
              env:
                  VERSION: ${{ fromJson(needs.build-tauri.outputs.product-info).version }}
                  BUILD_STAGE: ${{ inputs.buildStage }}
                  RELEASE_TYPE: ${{ inputs.releaseType }}
              with:
                  script: |
                      const buildStage = process.env.BUILD_STAGE
                      const releaseType = process.env.RELEASE_TYPE
                      
                      // 只有 product 环境才创建 tag
                      if (buildStage !== 'product' && releaseType !== 'product') {
                          console.log(`当前构建阶段为 ${buildStage}，跳过创建 tag（仅 product 环境创建 tag）`)
                          return
                      }
                      
                      const version = process.env.VERSION
                      const tagName = `v${version}`
                      const ref = `refs/tags/${tagName}`
                      
                      console.log(`开始创建 tag: ${tagName} (构建阶段: ${buildStage})`)
                      
                      // 检查 tag 是否已存在
                      try {
                          await github.rest.git.getRef({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              ref: ref
                          })
                          console.log(`Tag ${tagName} 已存在，跳过创建`)
                          return
                      } catch (error) {
                          if (error.status !== 404) {
                              // 如果不是 404 错误，说明有其他问题，抛出错误
                              throw error
                          }
                          // Tag 不存在（404），继续创建
                      }
                      
                      // 获取当前 commit SHA
                      const sha = context.sha
                      
                      // 创建 tag
                      try {
                          await github.rest.git.createRef({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              ref: ref,
                              sha: sha
                          })
                          console.log(`✅ 成功创建 tag: ${tagName} (${sha})`)
                      } catch (error) {
                          // 如果是因为 tag 已存在而失败（422），则忽略
                          if (error.status === 422) {
                              console.log(`Tag ${tagName} 已存在，跳过创建`)
                          } else {
                              // 其他错误则抛出
                              throw error
                          }
                      }
